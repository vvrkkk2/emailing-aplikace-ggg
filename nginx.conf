# Přesměrování HTTP na HTTPS
server {
    listen 80;
    server_name api.coldmail.pro app.coldmail.pro;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name api.coldmail.pro app.coldmail.pro;

    # Cesty k Let's Encrypt certifikátům (vygenerované přes Certbot)
    ssl_certificate /etc/letsencrypt/live/coldmail.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coldmail.pro/privkey.pem;

    # Bezpečnostní hlavičky
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # 1. API Endpoint pro Open Tracking (1x1 pixel)
    location /t/open/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Vypnutí logování pro tracking pixely, aby se neplnil access.log
        access_log off;
    }

    # 2. Hlavní aplikace (Frontend + zbytek API)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
