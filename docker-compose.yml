version: '3.8'

services:
  app:
    build: .
    container_name: coldmail_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - coldmail_net

  db:
    image: postgres:15-alpine
    container_name: coldmail_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-coldmail}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-coldmail}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - coldmail_net

  redis:
    image: redis:7-alpine
    container_name: coldmail_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      - coldmail_net

volumes:
  pgdata:
  redisdata:

networks:
  coldmail_net:
    driver: bridge
